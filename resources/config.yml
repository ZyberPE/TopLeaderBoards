update-time: 60

leaderboards:

  TopKills:
    title: "§6Top Kills"
    type: kills
    lines: 10
    format: "§e{rank}. §f{player} §7- §c{value}"

  TopDeaths:
    title: "§cTop Deaths"
    type: deaths
    lines: 10
    format: "§e{rank}. §f{player} §7- §c{value}"

  TopMinedBlocks:
    title: "§aTop Mined Blocks"
    type: mined
    lines: 10
    format: "§e{rank}. §f{player} §7- §a{value}"

  TopMoney:
    title: "§6Top Money"
    type: money
    lines: 10
    format: "§e{rank}. §f{player} §7- §6${value}"

messages:
  spawned: "§aLeaderboard {name} spawned."
  removed: "§cLeaderboard {name} removed."
  not-found: "§cLeaderboard not found."
  list: "§eLeaderboards: {list}"
  usage: "§c/lb spawn <name> | /lb remove <name> | /lb list"
